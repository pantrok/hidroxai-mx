name: CI
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Instalar dependencias
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check src scripts tests
      - name: Pruebas (pytest)
        run: pytest -q
