# Cuencas / regiones hidrológicas piloto para HidroXAI-MX (OE6)
# Filtro maestro aplicado sobre los catálogos del SIH (columna de región hidrológica).

# Regiones hidrológicas (número) que cubren las cuencas piloto.
# 12 = Lerma-Santiago · 26 = Pánuco · 18 = Balsas (incluye Cutzamala y Alta del Balsas)
regiones_hidrologicas: [12, 18, 26]

cuencas_piloto:
  # bbox = [min_lon, min_lat, max_lon, max_lat]. Aproximación generosa al área de la
  # cuenca para (a) recortar el CEM en INEGI y (b) filtrar estaciones por geometría real
  # (la RH del catálogo trae errores: ABASOLO Morelos figura en lon=-116 = Tijuana).
  - nombre: "Cutzamala"
    region_hidrologica: 18          # subsistema dentro de Balsas
    bbox: [-100.7, 18.4, -99.4, 19.7]
    prioridad: 1
    cem_resolucion_m: 30
    nota: "Abastece ~30% de la ZMVM; opera recurrente <40% de capacidad útil."
  # Lerma-Santiago se parte en 3 sub-cuencas geográficas porque su bbox completo
  # (688x378 km) excede los ~16 GB de RAM al fill/d8/flow_accumulation con whitebox.
  - nombre: "Lerma Alto"
    region_hidrologica: 12
    bbox: [-100.6, 19.2, -99.4, 20.0]
    prioridad: 1
    cem_resolucion_m: 30
    nota: "Cabecera del Lerma: Edo. de México (Toluca), Querétaro sur."
  - nombre: "Bajio"
    region_hidrologica: 12
    bbox: [-103.5, 20.0, -100.5, 21.5]
    prioridad: 1
    cem_resolucion_m: 30
    nota: "Lerma Medio: Guanajuato, Michoacán norte, Querétaro."
  - nombre: "Santiago"
    region_hidrologica: 12
    bbox: [-105.7, 20.5, -102.0, 22.7]
    prioridad: 1
    cem_resolucion_m: 30
    nota: "Lago Chapala → Pacífico: Jalisco, Nayarit."
  - nombre: "Panuco"
    region_hidrologica: 26
    bbox: [-100.7, 18.9, -97.5, 24.1]
    prioridad: 1
    cem_resolucion_m: 30
  - nombre: "Alta del Balsas"
    region_hidrologica: 18
    bbox: [-99.5, 18.0, -97.6, 19.5]
    prioridad: 1
    cem_resolucion_m: 15          # cuenca pequeña/montañosa de cabecera: mayor detalle
    nota: "Zona de la Unidad Académica del IPN; poco estudiada. Prueba de sensibilidad a 15 m."

criterios_seleccion_estaciones:
  # Main thresholds reflect the continuity of each monitoring network.
  # Hydro series from 30% to <60% remain separate for sensitivity/reconstruction.
  cobertura_minima:
    hidrometricas: 0.60
    climatologicas: 0.80
  cobertura_extendida_hidrometricas: 0.30
  n_minimo_estaciones: 200        # OE1
  periodo: { inicio: "2010-01-01", fin: "2025-12-31" }
