# Pipeline de datos reproducible (DVC). Ejecutar: dvc repro | snapshot: git tag v2026.06
stages:
  catalogs:
    cmd: python scripts/01_download_sih_catalogs.py
    deps: [scripts/01_download_sih_catalogs.py, conf/sources.yaml]
    outs: [data/raw/sih]

  select_stations:
    cmd: python scripts/05_select_stations.py
    deps: [scripts/05_select_stations.py, conf/cuencas_piloto.yaml, data/raw/sih]
    outs:
      - data/processed/estaciones_candidatas_hidrometricas.csv
      - data/processed/estaciones_candidatas_climatologicas.csv

  download_series_hidro:
    cmd: python scripts/03_download_sih_series.py --tipo hidrometricas
    deps: [scripts/03_download_sih_series.py, data/processed/estaciones_candidatas_hidrometricas.csv]
    outs: [data/raw/sih_series/hidrometricas]

  download_series_clima:
    cmd: python scripts/03_download_sih_series.py --tipo climatologicas
    deps: [scripts/03_download_sih_series.py, data/processed/estaciones_candidatas_climatologicas.csv]
    outs: [data/raw/sih_series/climatologicas]

  build_canonical_hidro:
    cmd: python scripts/04_build_canonical.py --tipo hidrometricas
    deps: [scripts/04_build_canonical.py, src/hidroxai_mx, data/raw/sih_series/hidrometricas]
    outs: [data/processed/series_hidrometricas.parquet]

  build_canonical_clima:
    cmd: python scripts/04_build_canonical.py --tipo climatologicas
    deps: [scripts/04_build_canonical.py, src/hidroxai_mx, data/raw/sih_series/climatologicas]
    outs: [data/processed/series_climatologicas.parquet]

  build_features:
    # Solo la tabla compacta por-día (NO los .npz: se generan al entrenar).
    cmd: python scripts/07_build_features.py --no-save-tensors
    deps: [scripts/07_build_features.py, src/hidroxai_mx/features, data/processed/series_hidrometricas.parquet]
    outs: [data/features/feature_table.parquet]
